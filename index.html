<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>넷플릭스 영어 공부 자막 뷰어</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #212529;
            margin-bottom: 20px;
        }
        #file-loaders, #selected-subtitle, #subtitle-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #file-loaders {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .file-input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .file-input-wrapper label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }
        .file-input-wrapper input[type="file"] {
            border: 1px solid #ced4da;
            padding: 6px;
            border-radius: 6px;
            background-color: #f1f3f5;
        }
        #selected-subtitle {
            text-align: center;
        }
        #selected-subtitle h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #495057;
        }
        #ko-text, #en-text {
            font-size: 1.35em;
            font-weight: 500;
            margin: 12px 0;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
        }
        #ko-text {
            background-color: #f1f3f5;
            color: #343a40;
            border-left: 5px solid #6c757d;
        }
        #en-text {
            background-color: #e8f4fd;
            color: #0056b3;
            border-left: 5px solid #007bff;
        }
        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        #controls button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background-color: #007bff;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }
        #controls button:hover {
            background-color: #0056b3;
        }
        #controls #stop-btn {
            background-color: #dc3545;
        }
        #controls #stop-btn:hover {
            background-color: #bd2130;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-wrapper input {
            margin-right: 6px;
            transform: scale(1.1);
        }
        #subtitle-container h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #495057;
        }
        #subtitle-list {
            height: 450px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            background: #ffffff;
            border-radius: 8px;
        }
        .subtitle-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f3f5;
            cursor: pointer;
            display: flex;
            gap: 20px;
            transition: background-color 0.15s;
        }
        .subtitle-item:hover {
            background-color: #f8f9fa;
        }
        .subtitle-item.active {
            background-color: #e8f4fd;
            border-left: 4px solid #007bff;
        }
        .subtitle-id {
            font-weight: bold;
            color: #007bff;
            min-width: 40px;
            text-align: right;
        }
        .subtitle-ko, .subtitle-en {
            flex: 1;
            line-height: 1.4;
            word-break: keep-all;
        }
        .subtitle-ko {
            color: #495057;
        }
        .subtitle-en {
            color: #212529;
            font-weight: 500;
        }
        .info-msg {
            text-align: center;
            color: #868e96;
            padding: 40px 10px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <h1>🎬 넷플릭스 영어 공부 자막 뷰어</h1>

    <!-- 1. 파일 업로드 영역 -->
    <div id="file-loaders">
        <div class="file-input-wrapper">
            <label for="en-file">🔤 영어 자막 파일 (.srt / .txt)</label>
            <input type="file" id="en-file" accept=".srt,.txt">
        </div>
        <div class="file-input-wrapper">
            <label for="ko-file">🇰🇷 한국어 자막 파일 (.srt / .txt)</label>
            <input type="file" id="ko-file" accept=".srt,.txt">
        </div>
    </div>

    <!-- 2. 선택 문장 및 오디오 컨트롤 영역 -->
    <div id="selected-subtitle">
        <h2>Selected Sentence (선택된 문장)</h2>
        <div id="ko-text">자막 파일을 불러오신 후 학습할 문장을 선택해 주세요.</div>
        <div id="en-text">The English subtitle will be displayed here.</div>
        
        <div id="controls">
             <button id="ko-speak-btn">🔊 한국어 읽기</button>
             <button id="en-speak-btn">🔊 영어 읽기</button>
             <label class="checkbox-wrapper">
                 <input type="checkbox" id="repeat-checkbox"> 한 줄 반복 듣기
             </label>
             <button id="stop-btn">⏹ 중지</button>
        </div>
    </div>
    
    <!-- 3. 자막 리스트 출력 영역 -->
    <div id="subtitle-container">
        <h2>Subtitle List (자막 목록)</h2>
        <div id="subtitle-list">
            <p class="info-msg">가이드: 위의 파일 선택 버튼을 눌러 소장하신 영어 자막과 한국어 자막을 올려주세요.<br>시간대 매칭 시스템이 작동하여 싱크가 정확하게 연동됩니다.</p>
        </div>
    </div>

    <script>
        const enFileInput = document.getElementById('en-file');
        const koFileInput = document.getElementById('ko-file');
        const subtitleList = document.getElementById('subtitle-list');
        const koTextDisplay = document.getElementById('ko-text');
        const enTextDisplay = document.getElementById('en-text');
        const koSpeakBtn = document.getElementById('ko-speak-btn');
        const enSpeakBtn = document.getElementById('en-speak-btn');
        const repeatCheckbox = document.getElementById('repeat-checkbox');
        const stopBtn = document.getElementById('stop-btn');

        let mergedSubtitles = [];
        const synth = window.speechSynthesis;
        let currentUtterance = null;
        let isRepeating = false;
        let currentLang = 'en-US';
        let currentText = '';

        // "HH:MM:SS,mmm" 포맷의 시간을 밀리초(ms) 단위의 정수로 변환
        function timeToMs(timeStr) {
            const parts = timeStr.trim().split(/[:,]/);
            if (parts.length !== 4) return 0;
            return parseInt(parts[0], 10) * 3600000 + 
                   parseInt(parts[1], 10) * 60000 + 
                   parseInt(parts[2], 10) * 1000 + 
                   parseInt(parts[3], 10);
        }

        // 백틱(``)을 활용하여 구문 분석 에러를 우회한 안전한 SRT 파서
        function parseSrt(srtText) {
            // 문자열 패턴으로 인식하게 함으로써 편집기 상의 구문 분석 오류 방지
            const patternStr = "(\\d+)\\r?\\n([\\d:,]+)\\s*-->\\s*([\\d:,]+)\\r?\\n([\\s\\S]*?)(?=\\r?\\n\\r?\\n|\\r?\\n*$)";
            const pattern = new RegExp(patternStr, "g");
            let match;
            const result = [];
            
            while ((match = pattern.exec(srtText)) !== null) {
                result.push({
                    id: parseInt(match[1], 10),
                    startTime: timeToMs(match[2]),
                    endTime: timeToMs(match[3]),
                    text: match[4].replace(/\r?\n/g, ' ').replace(/<[^>]*>/g, '').trim()
                });
            }
            return result;
        }

        // 한국어 시간 범위에 들어오는 영어 문장들 매칭 및 병합 (시간 동기화)
        function mergeSubtitles(koSubs, enSubs) {
            const merged = [];
            let displayId = 1;

            koSubs.forEach(ko => {
                const overlappingEn = enSubs.filter(en => 
                    (ko.startTime < en.endTime) && (en.startTime < ko.endTime)
                );

                if (overlappingEn.length > 0) {
                    const enText = overlappingEn.map(e => e.text).join(' ');
                    merged.push({ id: displayId++, ko: ko.text, en: enText });
                } else {
                    merged.push({ id: displayId++, ko: ko.text, en: '' });
                }
            });
            return merged;
        }

        // 화면에 자막 목록 표시
        function displaySubtitles() {
            subtitleList.innerHTML = '';
            if (mergedSubtitles.length === 0) {
                subtitleList.innerHTML = `<p class="info-msg">싱크가 일치하는 자막 데이터가 없습니다.</p>`;
                return;
            }

            mergedSubtitles.forEach(sub => {
                const item = document.createElement('div');
                item.className = 'subtitle-item';
                item.dataset.id = sub.id;
                
                item.innerHTML = `
                    <div class="subtitle-id">${sub.id}</div>
                    <div class="subtitle-ko">${sub.ko}</div>
                    <div class="subtitle-en">${sub.en || '<em style="color:#adb5bd;">(No English subtitle match)</em>'}</div>
                `;

                item.addEventListener('click', () => {
                    document.querySelectorAll('.subtitle-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');

                    koTextDisplay.textContent = sub.ko;
                    enTextDisplay.textContent = sub.en;
                    
                    stopAudio();
                });
                
                subtitleList.appendChild(item);
            });
        }

        // 파일 선택 시 로드 및 처리
        async function loadAndProcessFiles() {
            const enFile = enFileInput.files[0];
            const koFile = koFileInput.files[0];

            if (!enFile || !koFile) {
                subtitleList.innerHTML = `<p class="info-msg">두 종류의 자막(영어/한국어) 파일을 모두 업로드해야 정렬됩니다.</p>`;
                return;
            }
            
            subtitleList.innerHTML = `<p class="info-msg">⚙️ 파일 분석 및 다국어 싱크 매칭 작업을 진행하고 있습니다...</p>`;

            try {
                const enText = await enFile.text();
                const koText = await koFile.text();

                const enSubs = parseSrt(enText);
                const koSubs = parseSrt(koText);
                
                mergedSubtitles = mergeSubtitles(koSubs, enSubs);
                displaySubtitles();
            } catch (error) {
                subtitleList.innerHTML = `<p class="info-msg" style="color: #dc3545;">파일 해석에 실패했습니다. 올바른 형식의 srt 파일인지 다시 한번 확인해 주세요.</p>`;
                console.error("자막 처리 에러 상세:", error);
            }
        }

        enFileInput.addEventListener('change', loadAndProcessFiles);
        koFileInput.addEventListener('change', loadAndProcessFiles);

        // Web Speech API (TTS) 실행 로직
        function speak(text, lang) {
            stopAudio();
            if (!text || text.trim() === '') return;

            currentText = text;
            currentLang = lang;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            currentUtterance = utterance;

            utterance.onend = () => {
                if (isRepeating && repeatCheckbox.checked) {
                    speak(currentText, currentLang);
                } else {
                    isRepeating = false;
                    currentUtterance = null;
                }
            };

            synth.speak(utterance);
        }

        function stopAudio() {
            isRepeating = false;
            if (currentUtterance) {
                currentUtterance.onend = null;
            }
            synth.cancel();
        }

        koSpeakBtn.addEventListener('click', () => {
            isRepeating = true;
            speak(koTextDisplay.textContent, 'ko-KR');
        });

        enSpeakBtn.addEventListener('click', () => {
            isRepeating = true;
            speak(enTextDisplay.textContent, 'en-US');
        });

        stopBtn.addEventListener('click', stopAudio);
    </script>
</body>
</html>
