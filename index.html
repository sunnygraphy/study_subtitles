<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>넷플릭스 스마트 자막 학습기</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        h1 {
            color: #212529;
            margin-bottom: 20px;
        }
        #file-loaders, #selected-subtitle, #subtitle-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #file-loaders {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .file-input-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .file-input-wrapper label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }
        .file-input-wrapper input[type="file"] {
            border: 1px solid #ced4da;
            padding: 6px;
            border-radius: 6px;
            background-color: #f1f3f5;
        }
        #selected-subtitle {
            text-align: center;
        }
        #selected-subtitle h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #495057;
        }
        /* 문장 표시 영역 */
        #ko-text, #en-text {
            font-size: 1.35em;
            font-weight: 500;
            margin: 12px 0;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: keep-all;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        #ko-text:hover, #en-text:hover {
            opacity: 0.9;
        }
        #ko-text {
            background-color: #f1f3f5;
            color: #343a40;
            border-left: 5px solid #6c757d;
        }
        #en-text {
            background-color: #e8f4fd;
            color: #0056b3;
            border-left: 5px solid #007bff;
        }
        /* 블라인드(숨김) 처리 CSS */
        .hidden-text {
            background-color: #dee2e6 !important;
            color: transparent !important;
            cursor: pointer;
            position: relative;
            border-color: #adb5bd !important;
        }
        .hidden-text::after {
            content: '👀 클릭하여 문장 보기 및 듣기';
            color: #495057;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            font-weight: bold;
        }
        .hidden-text:hover {
            background-color: #ced4da !important;
        }

        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        #controls button {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background-color: #007bff;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }
        #controls button:hover {
            background-color: #0056b3;
        }
        #controls #stop-btn {
            background-color: #6c757d;
        }
        #controls #stop-btn:hover {
            background-color: #5a6268;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #495057;
            cursor: pointer;
            user-select: none;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }
        .checkbox-wrapper input {
            margin-right: 6px;
            transform: scale(1.1);
        }
        
        #subtitle-list {
            height: 450px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            background: #ffffff;
            border-radius: 8px;
        }
        .subtitle-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f3f5;
            cursor: pointer;
            display: flex;
            gap: 20px;
            transition: background-color 0.15s;
        }
        .subtitle-item:hover {
            background-color: #f8f9fa;
        }
        .subtitle-item.active {
            background-color: #e8f4fd;
            border-left: 4px solid #007bff;
        }
        .subtitle-id {
            font-weight: bold;
            color: #007bff;
            min-width: 40px;
            text-align: right;
        }
        .subtitle-ko, .subtitle-en {
            flex: 1;
            line-height: 1.4;
            word-break: keep-all;
        }
        .subtitle-en {
            font-weight: 500;
        }
        .info-msg {
            text-align: center;
            color: #868e96;
            padding: 40px 10px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <h1>🎬 넷플릭스 스마트 자막 학습기</h1>

    <div id="file-loaders">
        <div class="file-input-wrapper">
            <label for="en-file">🔤 영어 자막 파일 (.srt / .txt)</label>
            <input type="file" id="en-file" accept=".srt,.txt">
        </div>
        <div class="file-input-wrapper">
            <label for="ko-file">🇰🇷 한국어 자막 파일 (.srt / .txt)</label>
            <input type="file" id="ko-file" accept=".srt,.txt">
        </div>
    </div>

    <div id="selected-subtitle">
        <h2>학습 모드 화면</h2>
        <div id="ko-text">자막을 불러오신 후 아래 재생 버튼을 누르거나 목록을 클릭하세요.</div>
        <div id="en-text">The English subtitle will be displayed here.</div>
        
        <div id="controls">
             <button id="ko-speak-btn">▶️ 한국어 재생 / 다음</button>
             <button id="en-speak-btn">▶️ 영어 재생 / 다음</button>
             <label class="checkbox-wrapper">
                 <input type="checkbox" id="repeat-checkbox"> 🔁 한 줄 반복
             </label>
             <button id="stop-btn">⏹ 정지 및 모두 보기</button>
        </div>
    </div>
    
    <div id="subtitle-container">
        <h2>전체 자막 목록</h2>
        <div id="subtitle-list">
            <p class="info-msg">가이드: 영어 자막과 한국어 자막 파일을 모두 올려주세요.<br>시간이 일치하는 자막끼리 짝이 맞춰져 목록이 생성됩니다.</p>
        </div>
    </div>

    <script>
        const enFileInput = document.getElementById('en-file');
        const koFileInput = document.getElementById('ko-file');
        const subtitleList = document.getElementById('subtitle-list');
        const koTextDisplay = document.getElementById('ko-text');
        const enTextDisplay = document.getElementById('en-text');
        const koSpeakBtn = document.getElementById('ko-speak-btn');
        const enSpeakBtn = document.getElementById('en-speak-btn');
        const repeatCheckbox = document.getElementById('repeat-checkbox');
        const stopBtn = document.getElementById('stop-btn');

        let mergedSubtitles = [];
        const synth = window.speechSynthesis;
        let currentUtterance = null;
        let currentIndex = -1;
        let isStudying = false; 

        function timeToMs(timeStr) {
            const parts = timeStr.trim().split(/[:,]/);
            if (parts.length !== 4) return 0;
            return parseInt(parts[0], 10) * 3600000 + parseInt(parts[1], 10) * 60000 + parseInt(parts[2], 10) * 1000 + parseInt(parts[3], 10);
        }

        function parseSrt(srtText) {
            const patternStr = `(\\d+)\\r?\\n([\\d:,]+)\\s*-->\\s*([\\d:,]+)\\r?\\n([\\s\\S]*?)(?=\\r?\\n\\r?\\n|\\r?\\n*$)`;
            const pattern = new RegExp(patternStr, "g");
            let match;
            const result = [];
            while ((match = pattern.exec(srtText)) !== null) {
                result.push({
                    id: parseInt(match[1], 10),
                    startTime: timeToMs(match[2]),
                    endTime: timeToMs(match[3]),
                    text: match[4].replace(/\r?\n/g, ' ').replace(/<[^>]*>/g, '').trim()
                });
            }
            return result;
        }

        function mergeSubtitles(koSubs, enSubs) {
            const merged = [];
            koSubs.forEach(ko => {
                const overlappingEn = enSubs.filter(en => (ko.startTime < en.endTime) && (en.startTime < ko.endTime));
                if (overlappingEn.length > 0) {
                    const enText = overlappingEn.map(e => e.text).join(' ');
                    merged.push({ ko: ko.text, en: enText });
                } else {
                    merged.push({ ko: ko.text, en: '' });
                }
            });
            return merged;
        }

        function displaySubtitles() {
            subtitleList.innerHTML = '';
            if (mergedSubtitles.length === 0) {
                subtitleList.innerHTML = `<p class="info-msg">싱크가 일치하는 자막 데이터가 없습니다.</p>`;
                return;
            }

            mergedSubtitles.forEach((sub, index) => {
                const item = document.createElement('div');
                item.className = 'subtitle-item';
                item.dataset.index = index;
                
                item.innerHTML = `
                    <div class="subtitle-id">${index + 1}</div>
                    <div class="subtitle-ko">${sub.ko}</div>
                    <div class="subtitle-en">${sub.en || '<em style="color:#adb5bd;">(매칭 안됨)</em>'}</div>
                `;

                item.addEventListener('click', () => {
                    stopAudio();
                    currentIndex = index;
                    isStudying = true; 

                    document.querySelectorAll('.subtitle-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');

                    koTextDisplay.textContent = sub.ko || '(내용 없음)';
                    enTextDisplay.textContent = sub.en || '(매칭된 영어 자막 없음)';
                    
                    koTextDisplay.classList.remove('hidden-text');
                    if (sub.en) enTextDisplay.classList.add('hidden-text');
                    else enTextDisplay.classList.remove('hidden-text');

                    if (sub.ko) speak(sub.ko, 'ko-KR');
                });
                
                subtitleList.appendChild(item);
            });
        }

        async function loadAndProcessFiles() {
            const enFile = enFileInput.files[0];
            const koFile = koFileInput.files[0];
            if (!enFile || !koFile) return;
            
            subtitleList.innerHTML = `<p class="info-msg">⚙️ 파일 분석 및 매칭 중...</p>`;
            try {
                const enText = await enFile.text();
                const koText = await koFile.text();
                mergedSubtitles = mergeSubtitles(parseSrt(koText), parseSrt(enText));
                displaySubtitles();
            } catch (error) {
                subtitleList.innerHTML = `<p class="info-msg" style="color: #dc3545;">파일 해석 에러가 발생했습니다.</p>`;
            }
        }

        enFileInput.addEventListener('change', loadAndProcessFiles);
        koFileInput.addEventListener('change', loadAndProcessFiles);

        // -------------------------
        // 🌟 음성 정제(필터링) 함수 추가
        // -------------------------
        function cleanTextForSpeech(text) {
            if (!text) return '';
            let cleaned = text;
            
            // 1. 대괄호/소괄호 안의 내용 전체 제거 (예: [birds chirping], (음악 소리), [Libby])
            cleaned = cleaned.replace(/\[.*?\]/g, ' ');
            cleaned = cleaned.replace(/\(.*?\) /g, ' ');
            
            // 2. 발음에 방해되는 특수 기호들 제거 (대시, 물결표, 별표, 음악 기호)
            cleaned = cleaned.replace(/[-~*♪♫]/g, ' ');
            
            // 3. 화자 표시 콜론(이름:) 제거 (간혹 사용되는 방식 대비)
            cleaned = cleaned.replace(/^[가-힣A-Za-z0-9\s]+:/gm, ' ');
            
            // 4. 불필요하게 남은 공백들 하나로 압축
            return cleaned.replace(/\s+/g, ' ').trim();
        }

        // -------------------------
        // 음성 재생 로직 (필터링 적용)
        // -------------------------
        function speak(text, lang) {
            synth.cancel(); 
            setTimeout(() => { 
                // 원본 텍스트(text)를 화면에는 그대로 두고, 소리낼 때만 필터링(cleanedText)
                const cleanedText = cleanTextForSpeech(text);
                
                // 만약 [birds chirping] 처럼 발음할 내용이 아예 없는 문장이면 발음하지 않음
                if (!cleanedText || cleanedText === '') return;
                
                const utterance = new SpeechSynthesisUtterance(cleanedText);
                utterance.lang = lang;
                currentUtterance = utterance;

                utterance.onend = () => {
                    // 원본 텍스트를 파라미터로 넘겨 반복 실행
                    if (repeatCheckbox.checked && currentUtterance === utterance) {
                        speak(text, lang);
                    }
                };
                synth.speak(utterance);
            }, 50); 
        }

        function stopAudio() {
            synth.cancel();
            currentUtterance = null;
        }

        function playCurrentOrNext(mode) {
            if (mergedSubtitles.length === 0) return;

            if (currentIndex === -1) {
                currentIndex = 0;
            } else if (isStudying) {
                currentIndex++;
                if (currentIndex >= mergedSubtitles.length) {
                    currentIndex = mergedSubtitles.length - 1; 
                    return; 
                }
            }
            
            isStudying = true; 
            const sub = mergedSubtitles[currentIndex];

            document.querySelectorAll('.subtitle-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`.subtitle-item[data-index="${currentIndex}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
            }

            koTextDisplay.textContent = sub.ko || '(내용 없음)';
            enTextDisplay.textContent = sub.en || '(매칭된 영어 자막 없음)';
            koTextDisplay.classList.remove('hidden-text');
            enTextDisplay.classList.remove('hidden-text');

            if (mode === 'ko') {
                if(sub.en) enTextDisplay.classList.add('hidden-text');
                speak(sub.ko, 'ko-KR');
            } else {
                if(sub.ko) koTextDisplay.classList.add('hidden-text');
                speak(sub.en, 'en-US');
            }
        }

        koSpeakBtn.addEventListener('click', () => playCurrentOrNext('ko'));
        enSpeakBtn.addEventListener('click', () => playCurrentOrNext('en'));
        
        stopBtn.addEventListener('click', () => {
            stopAudio();
            koTextDisplay.classList.remove('hidden-text');
            enTextDisplay.classList.remove('hidden-text');
        });

        koTextDisplay.addEventListener('click', () => {
            if (currentIndex === -1) return; 
            koTextDisplay.classList.remove('hidden-text');
            const text = mergedSubtitles[currentIndex]?.ko;
            if(text) speak(text, 'ko-KR');
        });

        enTextDisplay.addEventListener('click', () => {
            if (currentIndex === -1) return; 
            enTextDisplay.classList.remove('hidden-text');
            const text = mergedSubtitles[currentIndex]?.en;
            if(text) speak(text, 'en-US');
        });

    </script>
</body>
</html>
