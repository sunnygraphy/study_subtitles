<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>음성인식 데모</title>
</head>
<body>
  <h1>음성인식 테스트</h1>
  <button id="startBtn">🎙️ 시작</button>
  <button id="stopBtn">🛑 중지</button>
  <div id="result">결과가 여기에 표시됩니다</div>
  <div id="status">상태: 대기중</div>

  <script>
    // 브라우저 호환성 체크
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("이 브라우저는 음성인식을 지원하지 않습니다. 크롬을 사용하세요!");
    } else {
      const recognition = new SpeechRecognition();
      recognition.lang = 'ko-KR';       // 한국어
      recognition.continuous = true;    // 연속 인식
      recognition.interimResults = true;// 중간 결과 표시

      recognition.onstart = () => {
        document.getElementById('status').innerText = "상태: 인식 중...";
      };

      recognition.onend = () => {
        document.getElementById('status').innerText = "상태: 대기중";
      };

      recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        document.getElementById('result').innerText = transcript;
      };

      recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        document.getElementById('status').innerText = "에러: " + event.error;
      };

      document.getElementById('startBtn').onclick = () => recognition.start();
      document.getElementById('stopBtn').onclick = () => recognition.stop();
    }
  </script>
</body>
</html>
