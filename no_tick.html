<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>지속 음성 인식</title>
</head>
<body>
  <h1>계속 켜져 있는 음성 인식</h1>
  <button id="startBtn">🎤 시작</button>
  <button id="stopBtn">🛑 중지</button>
  <p id="result">결과: </p>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.lang = "ko-KR";
    recognition.continuous = true;       // 계속 듣기 모드
    recognition.interimResults = true;   // 중간 결과도 표시

    recognition.onresult = (event) => {
      let transcript = "";
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById("result").textContent = "결과: " + transcript;
    };

    // 자동 재시작: 삑삑 소리 줄이려면 onend에서 바로 재시작
    recognition.onend = () => {
      if (keepListening) {
        recognition.start();
      }
    };

    let keepListening = false;

    document.getElementById("startBtn").onclick = () => {
      keepListening = true;
      recognition.start();
    };

    document.getElementById("stopBtn").onclick = () => {
      keepListening = false;
      recognition.stop();
    };
  </script>
</body>
</html>
